<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Men· N&S - TV 2</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #4b2e1e;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('Cerdo.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .safe-area {
            position: relative;
            width: 1180px; height: 630px;
            z-index: 2;
        }

        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 530px; 
            overflow: hidden;
        }

        /* --- POSICIONES TV 2 --- */
        /* Cuadros Superiores (Cerdo) */
        #cat-cerdo-izq { top: 250px; left: 55px; height: 245px; }
        #cat-cerdo-der { top: 250px; left: 670px; height: 245px; }
        
        /* Cuadros Inferiores (Cortes Especiales) */
        #cat-especiales-izq { top: 515px; left: 55px; height: 110px; }
        #cat-especiales-der { top: 515px; left: 670px; height: 110px; }

        .item {
            display: grid;
            grid-template-columns: 1.8fr 35px 80px 45px 65px;
            align-items: center;
            height: 28px; /* Ajuste para 8 filas */
            margin-bottom: 2px;
            font-size: 13px;
            color: var(--blanco);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nombre { font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .label-bs { padding-left: 5px; text-align: left; font-size: 11px; }
        .label-ref { padding-left: 15px; text-align: left; font-size: 11px; color: var(--dorado); }
        .precio-bs { text-align: right; font-weight: bold; font-size: 14px; }
        .precio-ref { text-align: right; font-weight: bold; font-size: 14px; color: var(--dorado); }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="safe-area">
            <div class="cuadrante" id="cat-cerdo-izq"></div>
            <div class="cuadrante" id="cat-cerdo-der"></div>
            <div class="cuadrante" id="cat-especiales-izq"></div>
            <div class="cuadrante" id="cat-especiales-der"></div>
        </div>
    </div>

    <script>
        function ajustarEscala() {
            const safeArea = document.querySelector('.safe-area');
            const escalaX = window.innerWidth / 1280;
            const escalaY = window.innerHeight / 720;
            safeArea.style.transform = `scale(${escalaX}, ${escalaY})`;
            safeArea.style.transformOrigin = 'top left';
        }
        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(`${csvUrl}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                document.querySelectorAll('.cuadrante').forEach(div => div.innerHTML = '');

                let countCerdo = 0;
                let countEspeciales = 0;

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBs = cols[1].replace(/"/g, '').trim();
                        const precioRef = cols[2].replace(/"/g, '').trim();
                        const categoria = cols[3].replace(/"/g, '').trim().toLowerCase();

                        if (!producto || precioBs === "" || precioBs === "0") return;

                        let targetId = "";

                        // LėGICA DE REPARTO
                        if (categoria === "cerdo") {
                            countCerdo++;
                            targetId = (countCerdo <= 8) ? "cat-cerdo-izq" : "cat-cerdo-der";
                        } 
                        else if (categoria === "cortes especiales") {
                            countEspeciales++;
                            targetId = (countEspeciales <= 3) ? "cat-especiales-izq" : "cat-especiales-der";
                        }

                        const contenedor = document.getElementById(targetId);
                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="label-bs">Bs.</span>
                                    <span class="precio-bs">${precioBs}</span>
                                    <span class="label-ref">Ref:</span>
                                    <span class="precio-ref">${precioRef}</span>
                                </div>`;
                        }
                    }
                });
            } catch (e) { console.error("Error sincronizando..."); }
        }

        cargarMenu();
        setInterval(cargarMenu, 60000);
    </script>
</body>
</html>
