<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Frigorífico N&S</title>
    <style>
        :root {
            --dorado: #f1c40f; 
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 768px;
            overflow: hidden;
            /* Usamos la imagen de fondo limpia */
            background: url('Carnes.jpg') no-repeat center center;
            background-size: 100% 100%;
            background-color: #2c1a10;
            color: var(--blanco);
            font-family: 'Arial Narrow', Arial, sans-serif;
            text-transform: uppercase;
        }

        /* Contenedor principal en 4 cuadrantes */
        .grid-cruz {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            /* Los rellenos ajustan el texto dentro de los espacios de la imagen */
            padding: 380px 40px 60px 40px; 
            gap: 20px 60px;
        }

        .cuadrante {
            display: flex;
            flex-direction: column;
        }

        /* Estructura del Producto | Bs | Ref */
        .item {
            display: grid;
            grid-template-columns: 1.5fr 1fr 0.6fr;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 2px;
        }

        .nombre { font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .precio-bs { text-align: right; font-size: 0.75rem; opacity: 0.9; padding-right: 5px; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; }

        /* Widget de Tasa en E2 (Opcional, se puede quitar si no se usa) */
        #tasa-fixed {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: var(--dorado);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="tasa-fixed"></div>

    <div class="grid-cruz">
        <div class="cuadrante" id="cat-cortes-parrilleros"></div>
        
        <div class="cuadrante" id="cat-cortes-de-peparacion"></div>

        <div class="cuadrante" id="cat-cortes-americanos"></div>

        <div class="cuadrante" id="cat-cortes-especiales"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarDatos() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                filas.forEach((fila, index) => {
                    const cols = fila.includes(';') ? fila.split(';') : fila.split(',');
                    
                    if (cols.length >= 4) {
                        const producto = cols[0].trim();
                        const precioBs = cols[1].trim();
                        const precioRef = cols[2].trim();
                        const categoriaRaw = cols[3].trim().toLowerCase();

                        // Formatear ID para que coincida (ej: "cortes parrilleros" -> "cat-cortes-parrilleros")
                        const idFinal = "cat-" + categoriaRaw.replace(/\s+/g, '-');

                        const htmlItem = `
                            <div class="item">
                                <span class="nombre">${producto}</span>
                                <span class="precio-bs">Bs. ${precioBs}</span>
                                <span class="precio-ref">${precioRef}</span>
                            </div>`;

                        const contenedor = document.getElementById(idFinal);
                        if (contenedor) {
                            contenedor.innerHTML += htmlItem;
                        }
                    }

                    // Cargar Tasa de la celda E2 (Fila 1 en código, columna 4)
                    if (index === 0 && cols[4]) {
                        document.getElementById('tasa-fixed').innerText = "TASA: " + cols[4].trim();
                    }
                });
            } catch (error) {
                console.error("Error:", error);
            }
        }
        cargarDatos();
    </script>
</body>
</html>
