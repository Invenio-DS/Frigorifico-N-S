<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú N&S - 7 Filas Alineado</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a0f0a;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('Carnes_2.png');
            background-size: 100% 95%;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .safe-area {
            position: relative;
            width: 1180px;
            height: 630px;
            z-index: 2;
        }

        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 530px; 
            height: 245px; /* Altura optimizada para 7 filas */
            overflow: hidden;
        }

        /* COORDENADAS SUPERIORES */
        #cat-cortes-parrilleros { top: 70px; left: 40px; }
        #cat-cortes-de-preparacion { top: 70px; left: 620px; }
        
        /* COORDENADAS INFERIORES */
        #cat-cortes-americanos { top: 375px; left: 40px; }
        #cat-cortes-especiales { top: 375px; left: 620px; }

        .item {
            display: grid;
            /* 1. Nombre | 2. Etiqueta Bs | 3. Monto Bs | 4. Etiqueta Ref | 5. Monto Ref */
            grid-template-columns: 2fr 40px 80px 40px 60px;
            align-items: center;
            height: 32px; /* Reducido para que entren 7 filas (7x32 = 224px) */
            margin-bottom: 2px;
            font-size: 12px; /* Ligera reducción para legibilidad */
            color: var(--blanco);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nombre { font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Alineación de etiquetas a la izquierda y montos a la derecha */
        .label-bs { padding-left: 25px; text-align: left; font-size: 14px; color: var(--blanco); }
        .label-ref { padding-left: 25px; text-align: left; font-size: 14px; color: var(--dorado); }
        .precio-bs { text-align: right; font-weight: bold; font-size: 12px; padding-right: 5px; }
        .precio-ref { text-align: right; font-weight: bold; font-size: 12px; color: var(--dorado); }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="safe-area">
            <div class="cuadrante" id="cat-cortes-parrilleros"></div>
            <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
            <div class="cuadrante" id="cat-cortes-americanos"></div>
            <div class="cuadrante" id="cat-cortes-especiales"></div>
        </div>
    </div>

    <script>
        function ajustarEscala() {
            const safeArea = document.querySelector('.safe-area');
            const escalaX = window.innerWidth / 1280;
            const escalaY = window.innerHeight / 720;
            safeArea.style.transform = `scale(${escalaX}, ${escalaY})`;
            safeArea.style.transformOrigin = 'top left';
        }
        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(`${csvUrl}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                document.querySelectorAll('.cuadrante').forEach(div => div.innerHTML = '');

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBs = cols[1].replace(/"/g, '').trim();
                        const precioRef = cols[2].replace(/"/g, '').trim();
                        const cat = "cat-" + cols[3].replace(/"/g, '').trim().toLowerCase().replace(/\s+/g, '-');

                        const pLimpio = precioBs.replace(/[.,\s]/g, '');
                        if (!producto || pLimpio === "000" || pLimpio === "0" || precioBs === "") return;

                        const contenedor = document.getElementById(cat);
                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="label-bs">Bs.</span>
                                    <span class="precio-bs">${precioBs}</span>
                                    <span class="label-ref">Ref:</span>
                                    <span class="precio-ref">${precioRef}</span>
                                </div>`;
                        }
                    }
                });
            } catch (e) { console.error("Error sincronizando..."); }
        }

        cargarMenu();
        setInterval(cargarMenu, 60000);
    </script>
</body>
</html>
