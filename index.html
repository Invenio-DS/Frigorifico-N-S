<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Frigorífico N&S</title>
    <style>
        :root {
            --dorado: #f1c40f; 
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1180px; 
            height: 630px; 
            overflow: hidden;
            background: url('Carnes.jpg') no-repeat center center;
            background-size: 100% 100%;
            background-color: #1a0f0a;
            color: var(--blanco);
            font-family: 'Poppins', sans-serif;
            /* Quitamos text-transform: uppercase de aquí */
        }

        .grid-cruz {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 260px 30px 30px 30px; 
            gap: 30px 100px;
        }

        .cuadrante {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .item {
            display: grid;
            grid-template-columns: 1.8fr 1fr 0.7fr;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 1px;
            letter-spacing: 1px;
        }

        .nombre { 
            font-weight: bold;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            /* SOLO EL NOMBRE EN MAYÚSCULAS */
            text-transform: uppercase; 
        }

        .precio-bs { 
            text-align: right; 
            font-weight: bold;
            opacity: 0.9; 
            padding-right: 8px;
            /* Forzamos que los precios y "Bs" se mantengan normal */
            text-transform: none;
        }

        .precio-ref { 
            color: var(--dorado);
            font-weight: bold; 
            text-align: right;
            /* Forzamos que "Ref" se mantenga normal */
            text-transform: none;
        }

        #tasa-info {
            position: fixed;
            top: 10px;
            right: 15px;
            font-size: 16px;
            color: var(--dorado);
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="tasa-info"></div>

    <div class="grid-cruz">
        <div class="cuadrante" id="cat-cortes-parrilleros"></div>
        <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
        <div class="cuadrante" id="cat-cortes-americanos"></div>
        <div class="cuadrante" id="cat-cortes-especiales"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                filas.forEach((fila, index) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBs = cols[1].replace(/"/g, '').trim();
                        const precioRef = cols[2].replace(/"/g, '').trim();
                        const categoriaRaw = cols[3].replace(/"/g, '').trim().toLowerCase();

                        const idFinal = "cat-" + categoriaRaw.replace(/\s+/g, '-');
                        const contenedor = document.getElementById(idFinal);

                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBs}</span>
                                    <span class="precio-ref">Ref: ${precioRef}</span>
                                </div>`;
                        }
                    }

                    if (index === 0 && cols[4]) {
                        const tasaValor = cols[4].replace(/"/g, '').trim();
                        document.getElementById('tasa-info').innerText = "Tasa BCV: " + tasaValor;
                    }
                });
            } catch (error) {
                console.error("Error al cargar datos:", error);
            }
        }

        cargarMenu();
        setTimeout(() => { location.reload(); }, 300000);
    </script>
</body>
</html>
