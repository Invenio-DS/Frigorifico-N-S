<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Frigorífico N&S - 4 Cuadrantes</title>
    <style>
        :root {
            --dorado: #f1c40f; 
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 768px;
            overflow: hidden;
            background: url('Carnes.jpg') no-repeat center center;
            background-size: 100% 100%;
            background-color: #2c1a10;
            color: var(--blanco);
            font-family: 'Arial Narrow', Arial, sans-serif;
            text-transform: uppercase;
        }

        /* Contenedor en Cruz (2x2) */
        .contenedor-cruz {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas */
            grid-template-rows: 1fr 1fr;    /* Dos filas */
            width: 100%;
            height: 100%;
            /* Ajusta este padding si el logo central de tu imagen de Canva tapa el texto */
            padding: 20px;
            box-sizing: border-box;
        }

        .cuadrante {
            display: flex;
            flex-direction: column;
            padding: 40px; /* Espacio interno para que el texto no toque los bordes */
        }

        /* Estilo de los productos */
        .item {
            display: grid;
            grid-template-columns: 1.5fr 1fr 0.8fr;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nombre { font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .precio-bs { text-align: right; font-size: 0.8rem; padding-right: 10px; opacity: 0.8; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; }

        /* Títulos de categorías (opcional, si no están en tu imagen de Canva) */
        .titulo-cat {
            color: var(--dorado);
            border-bottom: 2px solid var(--dorado);
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="contenedor-cruz">
        <div class="cuadrante" id="cat-cortes-parrilleros">
            <div class="titulo-cat">Cortes Parrilleros</div>
        </div>
        
        <div class="cuadrante" id="cat-cortes-americanos">
            <div class="titulo-cat">Cortes Americanos</div>
        </div>

        <div class="cuadrante" id="cat-cortes-de-preparacion">
            <div class="titulo-cat">Cortes de Preparación</div>
        </div>

        <div class="cuadrante" id="cat-cortes-especiales">
            <div class="titulo-cat">Cortes Especiales</div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarDatos() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                filas.forEach(fila => {
                    const cols = fila.includes(';') ? fila.split(';') : fila.split(',');
                    
                    if (cols.length >= 4) {
                        const producto = cols[0].trim();
                        const precioBs = cols[1].trim();
                        const precioRef = cols[2].trim();
                        const categoriaRaw = cols[3].trim().toLowerCase();

                        // Convierte "Cortes Parrilleros" en "cat-cortes-parrilleros"
                        const idFinal = "cat-" + categoriaRaw.replace(/\s+/g, '-');

                        const htmlItem = `
                            <div class="item">
                                <span class="nombre">${producto}</span>
                                <span class="precio-bs">Bs. ${precioBs}</span>
                                <span class="precio-ref">REF: ${precioRef}</span>
                            </div>`;

                        const contenedor = document.getElementById(idFinal);
                        if (contenedor) {
                            contenedor.innerHTML += htmlItem;
                        }
                    }
                });
            } catch (error) {
                console.error("Error:", error);
            }
        }
        cargarDatos();
    </script>
</body>
</html>
