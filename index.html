<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Digital N&S - En Vivo Pro</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

            #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: url('https://raw.githubusercontent.com/Invenio-DS/Frigorifico-N-S/main/Carnes 2.jpg') no-repeat center center;
            background-size: 100% 100%; 
            z-index: -1;
        }

        #menu-canvas {
            position: absolute;
            top: 50%; left: 50%;
            width: 1180px; height: 630px;
            transform-origin: center center;
            /* Transición para el efecto de desvanecimiento */
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }

        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 530px; 
            height: 220px; 
            overflow: hidden;
        }

        #cat-cortes-parrilleros { top: 75px; left: 45px; }
        #cat-cortes-de-preparacion { top: 75px; left: 615px; }
        #cat-cortes-americanos { top: 370px; left: 45px; }
        #cat-cortes-especiales { top: 370px; left: 615px; }

        .item {
            display: grid;
            grid-template-columns: 2.2fr 1fr 0.8fr; 
            align-items: center;
            margin-bottom: 5px;
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 2px;
            color: var(--blanco);
        }

        .nombre { font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .precio-bs { text-align: right; font-weight: bold; padding-right: 8px; font-size: 12px; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; font-size: 12px; }

        /* Clase para el efecto de desvanecimiento */
        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="menu-canvas">
        <div class="cuadrante" id="cat-cortes-parrilleros"></div>
        <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
        <div class="cuadrante" id="cat-cortes-americanos"></div>
        <div class="cuadrante" id="cat-cortes-especiales"></div>
    </div>

    <script>
        function ajustarEscala() {
            const canvas = document.getElementById('menu-canvas');
            const escalaX = window.innerWidth / 1920;
            const escalaY = window.innerHeight / 1080;
            canvas.style.transform = `translate(-50%, -50%) scale(${escalaX}, ${escalaY})`;
        }

        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            const canvas = document.getElementById('menu-canvas');
            
            try {
                const response = await fetch(`${csvUrl}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                const divs = {
                    'cat-cortes-parrilleros': '',
                    'cat-cortes-de-preparacion': '',
                    'cat-cortes-americanos': '',
                    'cat-cortes-especiales': ''
                };

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBsStr = cols[1].replace(/"/g, '').trim();
                        const precioRefStr = cols[2].replace(/"/g, '').trim();
                        const cat = "cat-" + cols[3].replace(/"/g, '').trim().toLowerCase().replace(/\s+/g, '-');

                        const precioLimpio = precioBsStr.replace(/[.,\s]/g, '');
                        if (!producto || precioLimpio === "000" || precioLimpio === "0" || precioBsStr === "") return;

                        if (divs[cat] !== undefined) {
                            divs[cat] += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBsStr}</span>
                                    <span class="precio-ref">Ref: ${precioRefStr}</span>
                                </div>`;
                        }
                    }
                });

                // --- EFECTO VISUAL ---
                // 1. Desvanecer hacia afuera
                canvas.style.opacity = '0';
                
                setTimeout(() => {
                    // 2. Cambiar los datos mientras está oculto
                    for (let key in divs) {
                        document.getElementById(key).innerHTML = divs[key];
                    }
                    // 3. Desvanecer hacia adentro con los nuevos datos
                    canvas.style.opacity = '1';
                }, 800); // Espera a que termine la animación de salida

            } catch (e) { console.warn("Sincronizando..."); }
        }

        cargarMenu();
        setInterval(cargarMenu, 60000);
    </script>
</body>
</html>
