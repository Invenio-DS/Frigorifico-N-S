<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Frigorífico N&S</title>
    <style>
        :root {
            --dorado: #f1c40f; 
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 768px;
            overflow: hidden;
            /* Usamos la imagen que subiste */
            background: url('Carnes.jpg') no-repeat center center;
            background-size: 100% 100%;
            background-color: #1a0f0a;
            color: var(--blanco);
            font-family: 'Poppins', Poppins, Poppins;
            text-transform: uppercase;
        }

        /* Estructura de 4 cuadrantes en Cruz */
        .grid-cruz {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            /* Ajuste de márgenes para que el texto caiga bajo los títulos amarillos */
            padding: 300px 60px 50px 60px; 
            gap: 120px 150px;
        }

        .cuadrante {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Estructura de cada Producto: Nombre | Bs | Ref */
        .item {
            display: grid;
            grid-template-columns: 1.8fr 1fr 0.7fr;
            align-items: center;
            margin-bottom: 7px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 1px;
            letter-spacing: 1.2px;
        }

        .nombre { 
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .precio-bs { 
            text-align: right; 
            font-size: 0.9rem;
            font-weight: bold
            opacity: 0.9; 
            padding-right: 8px;
        }

        .precio-ref { 
            color: var(--dorado);
            font-size: 0.9rem;
            font-weight: bold; 
            text-align: right; 
        }

        /* Widget opcional para la tasa en la esquina */
        #tasa-info {
            position: fixed;
            top: 15px;
            right: 20px;
            font-size: 18px;
            color: var(--dorado);
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="tasa-info"></div>

    <div class="grid-cruz">
        <div class="cuadrante" id="cat-cortes-parrilleros"></div>
        
        <div class="cuadrante" id="cat-cortes-de-preparacion"></div>

        <div class="cuadrante" id="cat-cortes-americanos"></div>

        <div class="cuadrante" id="cat-cortes-especiales"></div>
    </div>

    <script>
        // REEMPLAZA CON TU URL DE "PUBLICAR EN LA WEB" COMO CSV
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                // Separamos por líneas y quitamos la primera (títulos)
                const filas = csvText.split(/\r?\n/).slice(1);

                filas.forEach((fila, index) => {
                    // Separador inteligente (detecta coma o punto y coma)
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBs = cols[1].replace(/"/g, '').trim();
                        const precioRef = cols[2].replace(/"/g, '').trim();
                        const categoriaRaw = cols[3].replace(/"/g, '').trim().toLowerCase();

                        // Convertimos "Cortes Parrilleros" -> "cat-cortes-parrilleros"
                        const idFinal = "cat-" + categoriaRaw.replace(/\s+/g, '-');
                        const contenedor = document.getElementById(idFinal);

                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBs}</span>
                                    <span class="precio-ref">${precioRef}</span>
                                </div>`;
                        }
                    }

                    // Tasa desde la columna E (índice 4) de la primera fila
                    if (index === 0 && cols[4]) {
                        const tasaValor = cols[4].replace(/"/g, '').trim();
                        document.getElementById('tasa-info').innerText = "TASA BCV: " + tasaValor;
                    }
                });
            } catch (error) {
                console.error("Error al cargar datos:", error);
            }
        }

        // Ejecutar carga
        cargarMenu();

        // Refrescar cada 5 minutos para ver cambios en el Excel sin tocar la TV
        setTimeout(() => { location.reload(); }, 300000);
    </script>
</body>
</html>
