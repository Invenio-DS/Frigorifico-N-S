<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú N&S - Ajuste 1080p</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #1a0f0a;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* CAPA DE FONDO: Se adapta a los 1080p manteniendo la proporción */
        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://raw.githubusercontent.com/frigorifico-ns/frigorifico-ns.github.io/main/Carnes.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* ÁREA DE TRABAJO: 1180x630 escalado proporcionalmente a 1080p */
        .safe-area {
            position: absolute;
            top: 0; left: 0;
            width: 92.1%; /* Equivale a 1180 de 1280 */
            height: 87.5%; /* Equivale a 630 de 720 */
            z-index: 2;
        }

        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 44%; /* Ancho de cada columna de precios */
            height: 38%; /* Alto para las 6 filas */
            overflow: hidden;
        }

        /* COORDENADAS EN % (Subidas para alinear con las barras amarillas) */
        #cat-cortes-parrilleros { top: 11%; left: 3%; }
        #cat-cortes-de-preparacion { top: 11%; left: 52%; }
        
        #cat-cortes-americanos { top: 58%; left: 3%; }
        #cat-cortes-especiales { top: 58%; left: 52%; }

        .item {
            display: grid;
            grid-template-columns: 2.2fr 1fr 0.8fr;
            align-items: center;
            height: 15.5%; /* Distribuye las 6 filas en el alto del cuadrante */
            min-height: 30px;
            margin-bottom: 1%;
            font-size: 1.4vw; /* Fuente que escala con el ancho de la pantalla */
            color: var(--blanco);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nombre { font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .precio-bs { text-align: right; font-weight: bold; padding-right: 5%; font-size: 1.6vw; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; font-size: 1.6vw; }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="safe-area">
            <div class="cuadrante" id="cat-cortes-parrilleros"></div>
            <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
            <div class="cuadrante" id="cat-cortes-americanos"></div>
            <div class="cuadrante" id="cat-cortes-especiales"></div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(`${csvUrl}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                document.querySelectorAll('.cuadrante').forEach(div => div.innerHTML = '');

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBs = cols[1].replace(/"/g, '').trim();
                        const precioRef = cols[2].replace(/"/g, '').trim();
                        const cat = "cat-" + cols[3].replace(/"/g, '').trim().toLowerCase().replace(/\s+/g, '-');

                        const pLimpio = precioBs.replace(/[.,\s]/g, '');
                        if (!producto || pLimpio === "000" || pLimpio === "0" || precioBs === "") return;

                        const contenedor = document.getElementById(cat);
                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBs}</span>
                                    <span class="precio-ref">Ref: ${precioRef}</span>
                                </div>`;
                        }
                    }
                });
            } catch (e) { console.error("Error de sincronización"); }
        }

        cargarMenu();
        setInterval(cargarMenu, 60000);
    </script>
</body>
</html>
