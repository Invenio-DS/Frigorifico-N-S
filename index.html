<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú N&S - Ajuste de App</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        body, html {
            margin: 0; padding: 0;
            width: 1280px; height: 720px; /* Tamaño total que la app expande */
            overflow: hidden;
            background: transparent; /* Importante para que se vea el fondo de la app */
            font-family: Arial, sans-serif;
        }

        /* Este contenedor limita el área de los precios para que no pisen el RSS ni el Tiempo */
        .safe-area {
            position: relative;
            width: 1180px; /* Ancho total menos los 100px del tiempo */
            height: 630px; /* Alto total menos los 90px del footer */
            /* Descomenta la línea de abajo para ver el área mientras pruebas */
            /* border: 1px solid red; */ 
        }

        /* --- CATEGORÍAS INDEPENDIENTES --- */
        /* Ajustadas según la foto actual para que caigan bajo los títulos amarillos */
        
        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 530px; 
            height: 250px;
            overflow: hidden;
        }

        /* Coordenadas ajustadas para 1280x720 (basadas en tu imagen actual) */
        #cat-cortes-parrilleros { top: 440px; left: 30px; }
        #cat-cortes-de-preparacion { top: 440px; left: 610px; }
        
        /* Estas se verán más abajo, cerca del límite del RSS */
        #cat-cortes-americanos { top: 700px; left: 30px; } 
        #cat-cortes-especiales { top: 700px; left: 610px; }

        .item {
            display: grid;
            grid-template-columns: 2.2fr 1fr 0.8fr;
            align-items: center;
            margin-bottom: 4px;
            font-size: 15px;
            color: var(--blanco);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nombre { font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .precio-bs { text-align: right; font-weight: bold; padding-right: 10px; font-size: 16px; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; font-size: 16px; }
    </style>
</head>
<body>

    <div class="safe-area">
        <div class="cuadrante" id="cat-cortes-parrilleros"></div>
        <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
        <div class="cuadrante" id="cat-cortes-americanos"></div>
        <div class="cuadrante" id="cat-cortes-especiales"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(`${csvUrl}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                document.querySelectorAll('.cuadrante').forEach(div => div.innerHTML = '');

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBs = cols[1].replace(/"/g, '').trim();
                        const precioRef = cols[2].replace(/"/g, '').trim();
                        const cat = "cat-" + cols[3].replace(/"/g, '').trim().toLowerCase().replace(/\s+/g, '-');

                        const pLimpio = precioBs.replace(/[.,\s]/g, '');
                        if (!producto || pLimpio === "000" || pLimpio === "0" || precioBs === "") return;

                        const contenedor = document.getElementById(cat);
                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBs}</span>
                                    <span class="precio-ref">Ref: ${precioRef}</span>
                                </div>`;
                        }
                    }
                });
            } catch (e) { console.error("Error en sincronización"); }
        }

        cargarMenu();
        setInterval(cargarMenu, 60000);
    </script>
</body>
</html>
