<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú N&S - Fix Imagen 1080p</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a0f0a; /* Fondo marrón por si la imagen tarda */
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* CAPA DE FONDO: Forzamos la carga desde la URL de GitHub Raw */
        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('https://raw.githubusercontent.com/frigorifico-ns/frigorifico-ns.github.io/main/Carnes_2.jpg');
            background-size: cover; /* Cambiado a cover para que no deje bordes blancos */
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* ÁREA DE TRABAJO (1180x630 reales) */
        .safe-area {
            position: relative;
            width: 1180px;
            height: 630px;
            z-index: 2;
        }

        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 530px; 
            height: 240px; 
            overflow: hidden;
        }

        /* COORDENADAS REVISADAS: Subidas al máximo para alinear con las barras amarillas */
        #cat-cortes-parrilleros { top: 70px; left: 40px; }
        #cat-cortes-de-preparacion { top: 70px; left: 620px; }
        
        #cat-cortes-americanos { top: 375px; left: 40px; }
        #cat-cortes-especiales { top: 375px; left: 620px; }

        .item {
            display: grid;
            grid-template-columns: 2.2fr 1fr 0.8fr;
            align-items: center;
            height: 35px; /* Altura para que quepan 6 filas */
            margin-bottom: 2px;
            font-size: 12px;
            color: var(--blanco);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nombre { font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .precio-bs { text-align: right; font-weight: bold; padding-right: 10px; font-size: 12px; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; font-size: 12px; }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="safe-area">
            <div class="cuadrante" id="cat-cortes-parrilleros"></div>
            <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
            <div class="cuadrante" id="cat-cortes-americanos"></div>
            <div class="cuadrante" id="cat-cortes-especiales"></div>
        </div>
    </div>

    <script>
        // FUNCIÓN DE ESCALADO DINÁMICO
        // Esto detecta si la app expandió a 1080p y ajusta el grid automáticamente
        function ajustarEscala() {
            const safeArea = document.querySelector('.safe-area');
            const escalaX = window.innerWidth / 1280; // Proporción base
            const escalaY = window.innerHeight / 720;
            safeArea.style.transform = `scale(${escalaX}, ${escalaY})`;
            safeArea.style.transformOrigin = 'top left';
        }

        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(`${csvUrl}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                document.querySelectorAll('.cuadrante').forEach(div => div.innerHTML = '');

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBs = cols[1].replace(/"/g, '').trim();
                        const precioRef = cols[2].replace(/"/g, '').trim();
                        const cat = "cat-" + cols[3].replace(/"/g, '').trim().toLowerCase().replace(/\s+/g, '-');

                        const pLimpio = precioBs.replace(/[.,\s]/g, '');
                        if (!producto || pLimpio === "000" || pLimpio === "0" || precioBs === "") return;

                        const contenedor = document.getElementById(cat);
                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBs}</span>
                                    <span class="precio-ref">Ref: ${precioRef}</span>
                                </div>`;
                        }
                    }
                });
            } catch (e) { console.error("Error en sincronización"); }
        }

        cargarMenu();
        setInterval(cargarMenu, 60000);
    </script>
</body>
</html>
