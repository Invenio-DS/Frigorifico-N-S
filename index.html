<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Digital - Frigorífico N&S</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        body {
            margin: 0; padding: 0;
            width: 1280px; height: 720px;
            overflow: hidden;
            background: url('Carnes_2.jpg') no-repeat center center;
            background-size: 90% 90%;
            background-color: #1a0f0a;
            color: var(--blanco);
            font-family: 'Arial', sans-serif;
        }

        .menu-container {
            position: relative;
            width: 90%;
            height: 90%;
        }

        /* Contenedores independientes para cada categoría */
        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 510px; /* Ajustado para dejar aire en los bordes */
            height: 225px; 
            overflow: hidden;
        }

        /* COORDENADAS DE AJUSTE PARA TU IMAGEN 1180x630 */
        #cat-cortes-parrilleros { top: 236px; left: 54px; }
        #cat-cortes-de-preparacion { top: 236px; left: 603px; }
        #cat-cortes-americanos { top: 447px; left: 54px; }
        #cat-cortes-especiales { top: 447px; left: 603px; }

        /* Estilo de la fila de producto */
        .item {
            display: grid;
            grid-template-columns: 2.2fr 1fr 0.8fr; 
            align-items: center;
            margin-bottom: 6px;
            font-size: 13.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 2px;
        }

        .nombre { 
            font-weight: bold; 
            text-transform: uppercase; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .precio-bs { text-align: right; font-weight: bold; padding-right: 10px; font-size: 15px; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; font-size: 15px; }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="cuadrante" id="cat-cortes-parrilleros"></div>
        <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
        <div class="cuadrante" id="cat-cortes-americanos"></div>
        <div class="cuadrante" id="cat-cortes-especiales"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                // Dividir por líneas y omitir la cabecera
                const filas = csvText.split(/\r?\n/).slice(1);

                // Limpiar cuadrantes
                document.querySelectorAll('.cuadrante').forEach(c => c.innerHTML = '');

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBsStr = cols[1].replace(/"/g, '').trim();
                        const precioRefStr = cols[2].replace(/"/g, '').trim();
                        const categoriaRaw = cols[3].replace(/"/g, '').trim().toLowerCase();

                        // --- FILTRO: SI NO HAY NOMBRE O EL PRECIO ES 0, NO SE MUESTRA ---
                        const precioLimpio = precioBsStr.replace(/[.,\s]/g, '');
                        if (!producto || precioLimpio === "000" || precioLimpio === "0" || precioBsStr === "") {
                            return; 
                        }

                        // ID del contenedor según la categoría
                        const idFinal = "cat-" + categoriaRaw.replace(/\s+/g, '-');
                        const contenedor = document.getElementById(idFinal);

                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBsStr}</span>
                                    <span class="precio-ref">Ref: ${precioRefStr}</span>
                                </div>`;
                        }
                    }
                });
            } catch (error) {
                console.error("Error al cargar el menú:", error);
            }
        }

        cargarMenu();
        // Sincroniza cada 5 minutos
        setInterval(cargarMenu, 300000);
    </script>
</body>
</html>
