<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Adaptativo - Frigorífico N&S</title>
    <style>
        :root { --dorado: #f1c40f; --blanco: #ffffff; }

        /* El body ahora es un contenedor negro que centra el menú */
        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Este es el lienzo original. Se escalará solo. */
        #canvas-menu {
            position: relative;
            width: 1180px;
            height: 630px;
            background: url('Carnes.jpg') no-repeat center center;
            background-size: 100% 100%;
            transform-origin: center; /* Escala desde el centro */
        }

        .cuadrante {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 510px;
            height: 225px;
            overflow: hidden;
        }

        /* Coordenadas fijas para el diseño de 1180x630 */
        #cat-cortes-parrilleros { top: 85px; left: 55px; }
        #cat-cortes-de-preparacion { top: 85px; left: 615px; }
        #cat-cortes-americanos { top: 375px; left: 55px; }
        #cat-cortes-especiales { top: 375px; left: 615px; }

        .item {
            display: grid;
            grid-template-columns: 2.2fr 1fr 0.8fr;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 2px;
            color: var(--blanco);
        }

        .nombre { font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .precio-bs { text-align: right; font-weight: bold; padding-right: 10px; font-size: 15px; }
        .precio-ref { color: var(--dorado); font-weight: bold; text-align: right; font-size: 15px; }
    </style>
</head>
<body>

    <div id="canvas-menu">
        <div class="cuadrante" id="cat-cortes-parrilleros"></div>
        <div class="cuadrante" id="cat-cortes-de-preparacion"></div>
        <div class="cuadrante" id="cat-cortes-americanos"></div>
        <div class="cuadrante" id="cat-cortes-especiales"></div>
    </div>

    <script>
        // --- 1. LÓGICA DE ESCALADO AUTOMÁTICO ---
        function ajustarEscala() {
            const canvas = document.getElementById('canvas-menu');
            const anchoDeseado = 1180;
            const altoDeseado = 630;
            
            // Calculamos cuánto espacio hay disponible en la ventana actual
            const escalaAncho = window.innerWidth / anchoDeseado;
            const escalaAlto = window.innerHeight / altoDeseado;
            
            // Usamos la escala más pequeña para que el menú quepa siempre
            const escalaFinal = Math.min(escalaAncho, escalaAlto);
            
            canvas.style.transform = `scale(${escalaFinal})`;
        }

        window.addEventListener('resize', ajustarEscala);
        ajustarEscala(); // Ejecutar al cargar

        // --- 2. CARGA DE DATOS (Misma lógica anterior) ---
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIxfSFe9_7YUSgq8rqTctM6GXYHP5xCzgBVGmQo9RyNF02H9N3HV7r8Ras9p7-2507Ug5Pj13JT-N2/pub?gid=0&single=true&output=csv';

        async function cargarMenu() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const filas = csvText.split(/\r?\n/).slice(1);

                document.querySelectorAll('.cuadrante').forEach(c => c.innerHTML = '');

                filas.forEach((fila) => {
                    let cols = fila.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const producto = cols[0].replace(/"/g, '').trim();
                        const precioBsStr = cols[1].replace(/"/g, '').trim();
                        const precioRefStr = cols[2].replace(/"/g, '').trim();
                        const categoriaRaw = cols[3].replace(/"/g, '').trim().toLowerCase();

                        const precioLimpio = precioBsStr.replace(/[.,\s]/g, '');
                        if (!producto || precioLimpio === "000" || precioLimpio === "0" || precioBsStr === "") return; 

                        const idFinal = "cat-" + categoriaRaw.replace(/\s+/g, '-');
                        const contenedor = document.getElementById(idFinal);

                        if (contenedor) {
                            contenedor.innerHTML += `
                                <div class="item">
                                    <span class="nombre">${producto}</span>
                                    <span class="precio-bs">Bs. ${precioBsStr}</span>
                                    <span class="precio-ref">Ref: ${precioRefStr}</span>
                                </div>`;
                        }
                    }
                });
            } catch (e) { console.error(e); }
        }

        cargarMenu();
        setInterval(cargarMenu, 300000);
    </script>
</body>
</html>
